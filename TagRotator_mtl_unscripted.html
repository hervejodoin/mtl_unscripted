        const regionTags = "#authentikcanada #bonjourquebec #boquebec #canada #canadaexplored #canadalife #canadaparadise #canadaphotography #canadastreetphotography #canadaswonderland #canada🇨🇦 #canadianphotography #cheznousauquebec #clicquebec #explore_canada #explore_quebec #explorecanada #explorequebec #igcanada_ #igerscanada #igersquebec #imageofcanada #imagesofcanada #livelovecanada #loves_canada #narcitycanada #narcityquebec #qc #quebec #quebeccanada #quebecenphotos #quebecoriginal #quebecphotographie #quebecshot #quebecstreet #sharecangeo #streetsofcanada #tourcanada #tourismquebec";

        function computeCategoryCounts(total, proportions) {
            const raw = proportions.map(p => p * total);
            const counts = raw.map(Math.floor);
            let remainder = total - counts.reduce((a, b) => a + b, 0);
            const fractional = raw.map((v, i) => ({ i, frac: v - Math.floor(v) }));
            fractional.sort((a, b) => b.frac - a.frac);
            while (remainder > 0) {
                counts[fractional[remainder - 1].i] += 1;
                remainder -= 1;
            }
            return counts;
        }

        function buildTagPool() {
            const [mtlCount, streetCount, regionCount] = computeCategoryCounts(POOL_SIZE, [propMtlTags, propStreetTags, propRegionTags]);
            const mtlPool = getRandom(removeDuplicates(arrayFromTagsString(mtlTags)), mtlCount);
            const streetPool = getRandom(removeDuplicates(arrayFromTagsString(streetTags)), streetCount);
            const regionPool = getRandom(removeDuplicates(arrayFromTagsString(regionTags)), regionCount);
            const fullPool = removeDuplicates([...mtlPool, ...streetPool, ...regionPool]);
            return fullPool;
        }

        function renderTags() {
            const pool = buildTagPool();
            const requested = parseInt($('#tagCount').val(), 10) || 0;
            const displayCount = Math.max(1, Math.min(requested, pool.length));
            const selection = getRandom(pool, displayCount);

            $('#tagslist').empty();
            displayIGLinks(selection);
        }

        $(document).ready(function () {
            renderTags();
            $('#tagCount').on('input', renderTags);
        });

        function copyToClipboard(element) {
            var $temp = $("<input>");
            $("body").append($temp);
            $temp.val($(element).text()).select();
            document.execCommand("copy");
            $temp.remove();
            $("#copiedToast").toast("show");
        }

        function displayIGLinks(arr){
            $.each(arr, function( index, value ) {
                $('<a>',{
                text: value,
                href: 'https://www.instagram.com/explore/tags/' + value.substring(1),
                target: '_blank',
                class: 'ig-link text-decoration-none'
                }).appendTo('#tagslist');
                $('#tagslist').append(" ");
            });           
        };
    
        function arrayFromTagsString(inputString) {
            newString = inputString.replace(/^\s+|\s+$|\s+(?=\s)/g, "");
            newString = newString.replace(/\r\n|\r|\n/g, " ");
            newArray = newString.split(' ');

            newArray.forEach(checkHasHashtag)
            newArray.forEach(removeEmptyHashtags)
            return newArray;
        }

        function checkHasHashtag(item, index, arr) {
            arr[index] = item.charAt(0) == "#" ? item : "#"+item;
        }   
        
        function removeEmptyHashtags(item, index, arr) {
            if (item == "#") {
                arr.splice(index, 1);
            }
        } 

        function removeDuplicates(arr){
            return arr.filter(function(item, pos, self) {
                return self.indexOf(item) == pos;
            })
        }

        function convertArrayToIGLinks(arr){
            arr.forEach(makeIGLink);
            return arr;
        }

        function getRandom(arr, n) {
            var result = new Array(n),
                len = arr.length,
                taken = new Array(len);
            if (n > len)
                throw new RangeError("getRandom: more elements taken than available");
            while (n--) {
                var x = Math.floor(Math.random() * len);
                result[n] = arr[x in taken ? taken[x] : x];
                taken[x] = --len in taken ? taken[len] : len;
            }
            return result;
        }
